<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cap Caps™</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050509;
      --fg: #f5f5f5;
      --accent: #42e3ff;
      --muted: #8b8b96;
      --border: #262633;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151525 0, #050509 55%, #000 100%);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      max-width: 520px;
      width: 100%;
      text-align: center;
      padding: 32px 24px 28px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(5, 5, 12, 0.92);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.85),
        0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(18px);
    }

    .logo-mark {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 20% 0%, #ffffff 0, #d7f7ff 12%, transparent 40%),
        radial-gradient(circle at 80% 100%, #42e3ff 0, #0b1a2f 40%, #050509 80%);
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before {
      content: "CAP";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      letter-spacing: 0.18em;
      font-size: 18px;
      color: rgba(5, 5, 9, 0.9);
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.7),
        0 0 28px rgba(66, 227, 255, 0.9);
      mix-blend-mode: screen;
    }

    .logo-mark::after {
      content: "CAPS";
      position: absolute;
      inset: auto 0 14px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.32em;
      font-size: 9px;
      color: rgba(5, 5, 9, 0.9);
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.7),
        0 0 22px rgba(66, 227, 255, 0.9);
      mix-blend-mode: screen;
    }

    h1 {
      font-size: 26px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .lore {
      font-size: 13px;
      color: #b4b4c2;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .lore span {
      display: block;
      opacity: 0.8;
    }

    form {
      display: flex;
      flex-direction: row;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    input[type="email"] {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(8, 8, 16, 0.95);
      color: var(--fg);
      font-size: 14px;
      outline: none;
    }

    input[type="email"]::placeholder {
      color: #6f6f7c;
    }

    button {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #42e3ff, #7cf7d9);
      color: #020208;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    button:active {
      transform: translateY(1px);
      filter: brightness(0.96);
    }

    .footnote {
      font-size: 11px;
      color: #6f6f7c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .shell {
        padding: 26px 18px 22px;
      }
      form {
        flex-direction: column;
      }
      button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="logo-mark" aria-hidden="true"></div>

    <h1>Cap Caps™</h1>

    <p class="tagline">A new layer for fitted culture is about to snap into place.</p>

    <p class="lore">
      001: The OG — recovered from the crystal mold.<span>Series One surfaces soon.</span>
    </p>

    <!--
      ACTION NOTE:
      For zero backend work, this uses a mailto: link.
      Replace YOUR@EMAIL.COM with wherever you want early access requests to go.
    -->
    <form action="mailto:mbaer13@outlook.com" method="post" enctype="text/plain">
      <input
        type="email"
        name="email"
        placeholder="Drop your email to get the first drop."
        required
      />
      <button type="submit">Notify Me</button>
    </form>

    <div class="footnote">You’re early.</div>
  </main>
</body>
</html>
